name: Process automation runs

# Picks up automation_runs in "waiting" status whose scheduledFor has passed
# and resumes them. Same pattern as send-scheduled-campaigns.yml — the route
# handler does all the work.
#
# Required repo secrets:
#   VESTA_PROD_URL  e.g. https://vesta-crm.vercel.app
#   CRON_SECRET     must match the CRON_SECRET env var in Vercel

on:
  schedule:
    # Every 5 minutes — same cadence as scheduled campaigns. GitHub delays
    # cron under load so worst case ~10 min latency on a wait-step resume.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  fire:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Hit the cron endpoint
        env:
          URL: ${{ secrets.VESTA_PROD_URL }}
          SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$URL" ] || [ -z "$SECRET" ]; then
            echo "::error::Missing VESTA_PROD_URL or CRON_SECRET secrets"
            exit 1
          fi
          response=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" \
            -H "Authorization: Bearer $SECRET" \
            "$URL/api/cron/process-automations")
          status=$(echo "$response" | tail -n 1 | sed 's/HTTP_STATUS://')
          body=$(echo "$response" | sed '$d')
          echo "Status: $status"
          echo "Body: $body"
          if [ "$status" != "200" ]; then
            echo "::error::Cron endpoint returned $status"
            exit 1
          fi
