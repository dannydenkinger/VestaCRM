name: Pick A/B test winners

# Picks A/B subject-test campaigns whose test window has elapsed and sends
# the winning subject to the rest of the audience. Mirrors the auth pattern
# of the other cron workflows.

on:
  schedule:
    # Every 30 minutes — A/B test windows are typically 4-24 hours so this
    # is plenty granular without burning Actions minutes.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

jobs:
  fire:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Hit the cron endpoint
        env:
          URL: ${{ secrets.VESTA_PROD_URL }}
          SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$URL" ] || [ -z "$SECRET" ]; then
            echo "::error::Missing VESTA_PROD_URL or CRON_SECRET secrets"
            exit 1
          fi
          response=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" \
            -H "Authorization: Bearer $SECRET" \
            "$URL/api/cron/ab-winner")
          status=$(echo "$response" | tail -n 1 | sed 's/HTTP_STATUS://')
          body=$(echo "$response" | sed '$d')
          echo "Status: $status"
          echo "Body: $body"
          if [ "$status" != "200" ]; then
            echo "::error::Cron endpoint returned $status"
            exit 1
          fi
