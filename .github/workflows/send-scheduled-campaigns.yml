name: Send scheduled email campaigns

# GitHub Actions cron replaces Vercel Cron for minute-precision scheduling on
# Hobby plans (Vercel Hobby only allows daily crons). The lowest GH Actions
# cron granularity is 5 minutes.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   VESTA_PROD_URL       e.g. https://vesta-crm.vercel.app
#   CRON_SECRET          must match the CRON_SECRET env var in Vercel
#
# The workflow just curls the cron endpoint. All logic lives in the route
# handler — it finds scheduled campaigns whose time has passed and sends them.

on:
  schedule:
    # Every 5 minutes. GitHub delays cron jobs up to 5-10 minutes under load,
    # so true precision is ~10 min worst-case — still dramatically better than
    # Vercel Hobby's once-per-day.
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # also allow manual triggering from the Actions tab

jobs:
  fire:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Hit the cron endpoint
        env:
          URL: ${{ secrets.VESTA_PROD_URL }}
          SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$URL" ] || [ -z "$SECRET" ]; then
            echo "::error::Missing VESTA_PROD_URL or CRON_SECRET secrets"
            exit 1
          fi
          response=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" \
            -H "Authorization: Bearer $SECRET" \
            "$URL/api/cron/send-scheduled-campaigns")
          status=$(echo "$response" | tail -n 1 | sed 's/HTTP_STATUS://')
          body=$(echo "$response" | sed '$d')
          echo "Status: $status"
          echo "Body: $body"
          if [ "$status" != "200" ]; then
            echo "::error::Cron endpoint returned $status"
            exit 1
          fi
