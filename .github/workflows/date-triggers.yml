name: Fire date-based automation triggers (birthday / anniversary)

# Daily at 13:00 UTC (≈ 8am EST / 5am PST). Workspaces in other timezones
# fire at the closest local equivalent — full per-workspace TZ support is a
# future enhancement. Idempotent because fireTrigger honors single-enrollment.

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch: {}

jobs:
  fire:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Hit the cron endpoint
        env:
          URL: ${{ secrets.VESTA_PROD_URL }}
          SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$URL" ] || [ -z "$SECRET" ]; then
            echo "::error::Missing VESTA_PROD_URL or CRON_SECRET secrets"
            exit 1
          fi
          response=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" \
            -H "Authorization: Bearer $SECRET" \
            "$URL/api/cron/date-triggers")
          status=$(echo "$response" | tail -n 1 | sed 's/HTTP_STATUS://')
          body=$(echo "$response" | sed '$d')
          echo "Status: $status"
          echo "Body: $body"
          if [ "$status" != "200" ]; then
            echo "::error::Cron endpoint returned $status"
            exit 1
          fi
